<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Axes -->
  <line x1="4" y1="55" x2="61" y2="55" stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="55" x2="4"  y2="7"  stroke="#999" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Axis arrows -->
  <polygon points="61,55 57,52.5 57,57.5" fill="#999"/>
  <polygon points="4,7 1.5,11 6.5,11"     fill="#999"/>

  <!-- Shaded area under elevation profile (A_d) -->
  <polygon points="8,50 15,43 22,46 30,36 38,29 46,23 54,15 54,50"
           fill="#BBDEFB" opacity="0.85"/>

  <!-- Elevation profile (blue irregular polyline) -->
  <polyline points="8,50 15,43 22,46 30,36 38,29 46,23 54,15"
            stroke="#1565C0" stroke-width="2.5" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Equal Area Slope line (orange dashed straight line through outlet) -->
  <line x1="8" y1="50" x2="54" y2="22"
        stroke="#E65100" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round"/>

  <!-- Outlet dot -->
  <circle cx="8" cy="50" r="3" fill="#1565C0"/>
</svg>
